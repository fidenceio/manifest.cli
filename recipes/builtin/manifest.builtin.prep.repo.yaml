id: manifest.builtin.prep.repo
title: Prep Repo
kind: builtin
command: manifest prep repo
scope: repo
summary: Prepare the current repository by validating remotes and pulling the latest state.
entrypoint: manifest_prep_repo
inputs: {}
steps:
  - id: validate-repo
    uses: manifest.repo.validate
  - id: sync-repo
    uses: manifest.git.sync
