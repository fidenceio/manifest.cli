id: manifest.builtin.prep.repo
title: Prep Repo
kind: builtin
command: manifest prep repo
scope: repo
summary: Preview or apply repository prep for the current Git repository, including repo-scope validation, target confirmation, remote inspection, and latest-state sync.
entrypoint: manifest_prep_repo
execution:
  default_mode: preview
  requires_yes_for: [local-write]
inputs: {}
steps:
  - id: validate-repo
    uses: manifest.repo.validate
    effect: read
  - id: confirm-repo-target
    uses: manifest.repo.confirm_target
    effect: read
    when: apply
  - id: inspect-remotes
    uses: manifest.git.inspect_remotes
    effect: read
  - id: sync-repo
    uses: manifest.git.sync
    effect: local-write
