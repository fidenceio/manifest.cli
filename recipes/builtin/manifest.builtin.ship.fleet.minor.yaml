id: manifest.builtin.ship.fleet.minor
title: Ship Fleet Minor
kind: builtin
command: manifest ship fleet minor
scope: fleet
summary: Publish a coordinated minor release across a fleet.
entrypoint: manifest_ship_fleet
execution:
  default_mode: preview
  requires_yes_for: [local-write, remote-write]
inputs:
  release_type:
    type: enum
    values: [minor]
    default: minor
    required: true
  local:
    type: boolean
    default: false
steps:
  - id: load-fleet
    uses: manifest.fleet.load
    effect: read
  - id: prep-fleet
    uses: manifest.fleet.release_plan
    effect: read
    with:
      release_type: minor
  - id: ship-releaseable-services
    uses: manifest.fleet.ship_services
    effect: remote-write
    when: apply
