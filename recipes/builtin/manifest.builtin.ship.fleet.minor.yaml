id: manifest.builtin.ship.fleet.minor
title: Ship Fleet Minor
kind: builtin
command: manifest ship fleet minor
scope: fleet
summary: Publish a coordinated minor release across a fleet.
entrypoint: manifest_ship_fleet
inputs:
  release_type:
    type: enum
    values: [minor]
    default: minor
    required: true
  local:
    type: boolean
    default: false
steps:
  - id: load-fleet
    uses: manifest.fleet.load
  - id: prep-fleet
    uses: manifest.fleet.prep
    with:
      release_type: minor
  - id: refresh-fleet-docs
    uses: manifest.fleet.docs
  - id: create-prs
    uses: manifest.fleet.pr.create
    when: publish_release
  - id: queue-prs
    uses: manifest.fleet.pr.queue
    when: publish_release
