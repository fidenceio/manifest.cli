id: manifest.builtin.ship.repo.minor
title: Ship Repo Minor
kind: builtin
command: manifest ship repo minor
scope: repo
summary: Preview or publish a minor release for the current Git repository, including repo identity, target confirmation, release docs, tag/push, GitHub Release, Homebrew, installed CLI upgrade, and guarded follow-up patch behavior when applicable.
entrypoint: manifest_ship_repo
execution:
  default_mode: preview
  requires_yes_for: [local-write, remote-write]
inputs:
  release_type:
    type: enum
    values: [minor]
    default: minor
    required: true
  local:
    type: boolean
    default: false
  interactive:
    type: boolean
    default: false
steps:
  - id: identify-repo
    uses: manifest.repo.identity
    effect: read
  - id: confirm-repo-target
    uses: manifest.repo.confirm_target
    effect: read
    when: apply
  - id: sync-repo
    uses: manifest.git.sync
    effect: local-write
    when: apply
  - id: ensure-required-files
    uses: manifest.repo.ensure_required_files
    effect: local-write
    when: apply
  - id: get-trusted-timestamp
    uses: manifest.time.trusted_timestamp
    effect: read
  - id: bump-version
    uses: manifest.version.bump
    effect: local-write
    with:
      release_type: minor
  - id: generate-docs
    uses: manifest.docs.generate
    effect: local-write
  - id: archive-docs
    uses: manifest.docs.archive_sweep
    effect: local-write
  - id: validate-markdown
    uses: manifest.docs.validate_markdown
    effect: local-write
  - id: commit-release
    uses: manifest.git.commit_release
    effect: local-write
  - id: validate-release-state
    uses: manifest.repo.validate_release_state
    effect: read
  - id: tag-release
    uses: manifest.git.tag_release
    effect: local-write
    when: publish_release
  - id: push-release
    uses: manifest.git.push_release
    effect: remote-write
    when: publish_release
  - id: publish-homebrew
    uses: manifest.homebrew.publish
    effect: remote-write
    when: publish_release
  - id: create-github-release
    uses: github.release.create
    effect: remote-write
    when: publish_release && github.release.enabled
  - id: upgrade-installed-cli
    uses: manifest.install.upgrade_local
    effect: local-write
    when: publish_release
  - id: update-repository-metadata
    uses: manifest.repo.metadata
    effect: local-write
  - id: follow-up-patch
    uses: manifest.ship.followup_patch
    effect: remote-write
    when: publish_release && canonical_cli
