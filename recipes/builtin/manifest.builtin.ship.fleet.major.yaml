id: manifest.builtin.ship.fleet.major
title: Ship Fleet Major
kind: builtin
command: manifest ship fleet major
scope: fleet
summary: Publish a coordinated major release across a fleet.
entrypoint: manifest_ship_fleet
execution:
  default_mode: preview
  requires_yes_for: [local-write, remote-write]
inputs:
  release_type:
    type: enum
    values: [major]
    default: major
    required: true
  local:
    type: boolean
    default: false
steps:
  - id: load-fleet
    uses: manifest.fleet.load
    effect: read
  - id: prep-fleet
    uses: manifest.fleet.release_plan
    effect: read
    with:
      release_type: major
  - id: prep-releaseable-services-local
    uses: manifest.fleet.ship_services
    effect: local-write
    when: apply && local
  - id: publish-releaseable-services
    uses: manifest.fleet.ship_services
    effect: remote-write
    when: apply && publish_release
