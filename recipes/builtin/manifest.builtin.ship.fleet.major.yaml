id: manifest.builtin.ship.fleet.major
title: Ship Fleet Major
kind: builtin
command: manifest ship fleet major
scope: fleet
summary: Publish a coordinated major release across a fleet.
entrypoint: manifest_ship_fleet
inputs:
  release_type:
    type: enum
    values: [major]
    default: major
    required: true
  local:
    type: boolean
    default: false
steps:
  - id: load-fleet
    uses: manifest.fleet.load
  - id: prep-fleet
    uses: manifest.fleet.prep
    with:
      release_type: major
  - id: refresh-fleet-docs
    uses: manifest.fleet.docs
  - id: create-prs
    uses: manifest.fleet.pr.create
    when: publish_release
  - id: queue-prs
    uses: manifest.fleet.pr.queue
    when: publish_release
