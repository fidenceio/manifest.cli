id: manifest.builtin.ship.fleet.patch
title: Ship Fleet Patch
kind: builtin
command: manifest ship fleet patch
scope: fleet
summary: Publish a coordinated patch release across a fleet.
entrypoint: manifest_ship_fleet
inputs:
  release_type:
    type: enum
    values: [patch]
    default: patch
    required: true
  local:
    type: boolean
    default: false
steps:
  - id: load-fleet
    uses: manifest.fleet.load
  - id: prep-fleet
    uses: manifest.fleet.prep
  - id: refresh-fleet-docs
    uses: manifest.fleet.docs
  - id: create-prs
    uses: manifest.fleet.pr.create
    when: publish_release
  - id: queue-prs
    uses: manifest.fleet.pr.queue
    when: publish_release
