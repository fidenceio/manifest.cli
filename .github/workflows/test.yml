name: tests

on:
  # Every branch push is exercised; the `plan` job decides how much (see below).
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  # Nightly full run catches time/network/flaky drift that a change-scoped run
  # would miss.
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  # Decide the test plan from the triggering event (§5.10 event-tiered matrix).
  #
  #   Full + OS matrix  — anything that gates merge or release confidence:
  #                       PR-to-main, push-to-main, the nightly schedule, and
  #                       manual dispatch. Runs --no-cache so the suite always
  #                       executes here, now (mirrors the release gate).
  #   Fast lane         — routine feature-branch pushes: smoke tier +
  #                       change-aware selection on a single OS.
  #
  # The invariant — nothing merges to main or releases without a full run —
  # holds structurally: both PR-to-main and push-to-main take the full path, so
  # main is never advanced on a narrowed or cached result.
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.decide.outputs.tier }}
      changed: ${{ steps.decide.outputs.changed }}
      no_cache: ${{ steps.decide.outputs.no_cache }}
      os: ${{ steps.decide.outputs.os }}
    steps:
      - id: decide
        run: |
          set -euo pipefail
          full() {
            echo "tier=full"
            echo "changed=false"
            echo "no_cache=true"
            echo 'os=["ubuntu-latest","macos-latest"]'
          }
          fast() {
            echo "tier=smoke"
            echo "changed=true"
            echo "no_cache=false"
            echo 'os=["ubuntu-latest"]'
          }
          {
            case "${{ github.event_name }}" in
              pull_request|schedule|workflow_dispatch) full ;;
              push)
                if [ "${{ github.ref }}" = "refs/heads/main" ]; then full; else fast; fi
                ;;
              *) full ;;   # unknown event → safe default
            esac
          } >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }} ref=${{ github.ref }} ->"
          cat "$GITHUB_OUTPUT"

  bats:
    needs: plan
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.plan.outputs.os) }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so change-aware selection can find merge-base with main.
          fetch-depth: 0

      # Validation runs in the containerized runner — no test dependencies are
      # installed on the runner host. The macOS leg is the sole exception:
      # GitHub's macOS runners provide no Docker. §5.11 forced the GNU userland
      # (coreutils + gnu-sed gnubin) onto PATH so macOS runs the SAME GNU
      # sed/date/stat as Linux; this leg now verifies that forcing works on a
      # real runner (§5.12). It can be dropped for full container-only once §5.12
      # is green. gnu-sed is required — update_homebrew_formula's GNU `sed -i`
      # fails loud without it.
      - name: Install dependencies (macOS, host-native)
        if: matrix.os == 'macos-latest'
        run: |
          set -euxo pipefail
          # 'parallel' last keeps run-tests.sh --jobs (default 'auto') working.
          brew install bats-core yq bash coreutils gnu-sed parallel
          # macos-latest still ships /bin/bash 3.2 (no associative arrays).
          # bats's `#!/usr/bin/env bash` picks whichever bash is first in PATH —
          # ensure that's Homebrew's modern bash for every subsequent step.
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          /opt/homebrew/bin/bash --version | head -1
          yq --version

      - name: Print environment (macOS host)
        if: matrix.os == 'macos-latest'
        run: |
          bash --version | head -1
          bats --version
          yq --version
          git --version
          parallel --version | head -1

      - name: Print environment (Linux, Docker)
        if: matrix.os == 'ubuntu-latest'
        run: docker --version

      - name: Ensure origin/main ref (change-aware base)
        if: needs.plan.outputs.changed == 'true'
        run: |
          # The fast lane diffs against merge-base(HEAD, origin/main). Make sure
          # that ref exists; if the fetch fails, run-tests.sh fail-safes to the
          # full suite (slower, never less safe).
          git fetch --no-tags origin main:refs/remotes/origin/main || true

      - name: Build test args
        id: args
        run: |
          set -euo pipefail
          args=(--tier "${{ needs.plan.outputs.tier }}")
          [ "${{ needs.plan.outputs.changed }}" = "true" ]  && args+=(--changed)
          [ "${{ needs.plan.outputs.no_cache }}" = "true" ] && args+=(--no-cache)
          echo "args=${args[*]}" >> "$GITHUB_OUTPUT"

      - name: Run bats suite (Linux, containerized)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          echo "run-tests-container.sh ${{ steps.args.outputs.args }}"
          ./scripts/run-tests-container.sh ${{ steps.args.outputs.args }}

      - name: Run bats suite (macOS, host-native)
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          echo "run-tests.sh ${{ steps.args.outputs.args }}"
          ./scripts/run-tests.sh ${{ steps.args.outputs.args }}

      - name: Smoke-test the CLI (macOS host)
        if: matrix.os == 'macos-latest'
        run: |
          bash scripts/manifest-cli.sh version
          bash scripts/manifest-cli.sh help | head -40
          bash scripts/manifest-cli.sh status
          bash scripts/manifest-cli.sh doctor

      - name: Smoke-test the CLI (Linux, containerized)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/work" -w /work alpine:3.20 sh -lc '
            apk add --no-cache bash git yq coreutils >/dev/null
            # Mounted repo is host-owned but the container is root: tell git the
            # mount is safe (system scope, immune to $HOME) so repo-scoped
            # commands do not trip dubious-ownership.
            git config --system --add safe.directory "*"
            bash scripts/manifest-cli.sh version
            bash scripts/manifest-cli.sh help | head -40
            bash scripts/manifest-cli.sh status
            bash scripts/manifest-cli.sh doctor
          '
