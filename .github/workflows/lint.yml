name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Both jobs run their tooling inside pinned containers — no lint dependencies are
# installed on the runner host (mirrors the container-only validation rule).
jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck (hard gate — errors block the build)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/work" -w /work koalaman/shellcheck-alpine:v0.10.0 sh -lc '
            set -euo pipefail
            # All first-party shell sources. Reads .shellcheckrc automatically.
            find modules scripts -name "*.sh" -type f -print0 > files.zero
            printf "%s\0%s\0" install-cli.sh uninstall-cli.sh >> files.zero
            echo "scripts: $(tr -dc "\0" < files.zero | wc -c)"
            xargs -0 shellcheck --severity=error < files.zero
          '

      - name: ShellCheck (advisory — warnings reported, do not block)
        continue-on-error: true
        run: |
          set -uo pipefail
          docker run --rm -v "$PWD:/work" -w /work koalaman/shellcheck-alpine:v0.10.0 sh -lc '
            find modules scripts -name "*.sh" -type f -print0 > files.zero
            printf "%s\0%s\0" install-cli.sh uninstall-cli.sh >> files.zero
            xargs -0 shellcheck --severity=warning < files.zero
          '

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so commit-range scanning works

      - name: Scan repository for secrets
        run: |
          set -euo pipefail
          # Scan the working tree (committed files). Non-zero exit = leak found.
          docker run --rm -v "$PWD:/work" -w /work \
            zricethezav/gitleaks:v8.21.2 dir /work --redact --verbose
