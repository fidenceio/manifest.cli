name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          set -euxo pipefail
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Collect shell scripts
        id: collect
        run: |
          set -euo pipefail
          # All first-party shell sources. Reads .shellcheckrc automatically.
          find modules scripts -name '*.sh' -type f -print0 > files.zero
          printf '%s\0%s\0' install-cli.sh uninstall-cli.sh >> files.zero
          echo "count=$(tr -dc '\0' < files.zero | wc -c)" >> "$GITHUB_OUTPUT"

      - name: ShellCheck (hard gate — errors block the build)
        run: |
          set -euo pipefail
          xargs -0 shellcheck --severity=error < files.zero

      - name: ShellCheck (advisory — warnings reported, do not block)
        continue-on-error: true
        run: |
          set -uo pipefail
          xargs -0 shellcheck --severity=warning < files.zero

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so commit-range scanning works

      - name: Install gitleaks
        run: |
          set -euxo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository for secrets
        run: |
          set -euo pipefail
          # Scan the working tree (committed files). Non-zero exit = leak found.
          gitleaks dir . --redact --verbose
