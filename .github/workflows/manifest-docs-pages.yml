# Managed by Manifest CLI docs site generation
name: Manifest Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - name: Prepare Manifest docs source
        run: |
          rm -rf .manifest-pages-src
          mkdir -p .manifest-pages-src
          cp -R "docs-site"/. .manifest-pages-src/
          [ -f README.md ] && cp README.md .manifest-pages-src/README.md
          [ -f CHANGELOG.md ] && cp CHANGELOG.md .manifest-pages-src/CHANGELOG.md
          if [ -d docs ]; then
            mkdir -p .manifest-pages-src/docs
            cp -R docs/. .manifest-pages-src/docs/
          fi
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./.manifest-pages-src
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
